{% if page == 1 %}<span id="status-word-count" hx-swap-oob="true">{{ total }} words</span>{% endif %}
{% for w in words %}
  {% include 'partials/word_row.html' %}
{% endfor %}
{% if not words %}
<p style="color:#555;padding:12px;">No words match.</p>
{% endif %}
{% if next_page_url %}
<div id="load-more"
     hx-get="{{ next_page_url }}"
     hx-trigger="click"
     hx-target="#load-more"
     hx-swap="outerHTML"
     style="width:100%;padding:20px 0 8px;text-align:center;">
  <button style="font:600 13px/1 var(--sans);color:var(--text-3);background:none;border:1px solid var(--border);border-radius:6px;padding:7px 18px;cursor:pointer;letter-spacing:.02em;" onmouseover="this.style.background='#f0ece5'" onmouseout="this.style.background='none'">↓ load {{ [page_size, total - page * page_size] | min }} more</button>
</div>
{% endif %}
